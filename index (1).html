<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FFCS Timetable Planner</title>
  <style>
    :root {
      --ink: #0d2853;
      --muted: #5f6876;
      --line: #c9d0d7;
      --panel: #ffffff;
      --bg: #f3f5f8;
      --navy: #172d52;
      --green: #29a84a;
      --red: #df5454;
      --blue: #1976d2;
      --orange: #ff9f1c;
      --teal: #00897b;
      --violet: #8e24aa;
      --warn: #fff6df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: #1b2430;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(1850px, calc(100% - 48px));
      margin: 30px auto 40px;
    }

    h1 {
      margin: 0 0 26px;
      text-align: center;
      color: var(--ink);
      font-size: clamp(30px, 3vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .courses {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: 26px;
    }

    .course-card {
      border-top: 6px solid var(--accent);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 6px 18px rgba(15, 35, 70, .12);
      padding: 26px 24px 28px;
      min-height: 188px;
    }

    .course-card h2 {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 22px;
      color: var(--ink);
      font-size: 29px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .course-card small {
      color: var(--muted);
      font-size: 16px;
      font-weight: 400;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: #151a22;
      font-weight: 700;
      font-size: 16px;
    }

    select {
      width: 100%;
      min-height: 49px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 18px;
      font-size: 18px;
      color: #111820;
    }

    select:disabled {
      color: #8a93a1;
      background: #f7f8fa;
    }

    .actions {
      display: grid;
      grid-template-columns: 275px 1fr;
      gap: 14px;
      margin: 38px 0 28px;
      align-items: center;
    }

    button {
      min-height: 53px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .clear { background: var(--red); }
    .download { background: var(--green); }

    .notice {
      display: none;
      margin: -10px 0 18px;
      border: 1px solid #e9c56a;
      border-radius: 8px;
      background: var(--warn);
      padding: 12px 14px;
      color: #72530b;
      font-weight: 700;
    }

    .notice.show { display: block; }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #8e98a8;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 1320px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #9aa3ad;
      text-align: center;
      vertical-align: middle;
      height: 50px;
      padding: 6px;
      font-size: 12px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    thead th, .day, .row-head {
      background: var(--navy);
      color: #fff;
      font-weight: 800;
    }

    .day, .row-head { width: 138px; }
    .base { color: #617493; }
    .lunch { background: #eef1f4; }
    thead .lunch { background: #cad3d8; color: transparent; }

    .cell-stack {
      display: grid;
      gap: 4px;
      justify-items: center;
    }

    .chip {
      max-width: 100%;
      border-radius: 5px;
      padding: 3px 6px;
      color: #fff;
      font-weight: 800;
      font-size: 11px;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .conflict .chip { outline: 2px solid #ffeb3b; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .dot {
      display: inline-block;
      width: 11px;
      height: 11px;
      margin-right: 6px;
      border-radius: 50%;
      background: var(--dot);
      vertical-align: -1px;
    }

    @media (max-width: 1020px) {
      main { width: min(100% - 28px, 920px); }
      .courses { grid-template-columns: repeat(2, minmax(240px, 1fr)); }
      .actions { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .courses { grid-template-columns: 1fr; }
      .course-card { padding: 22px 18px; }
      .course-card h2 { font-size: 25px; }
      select { font-size: 16px; }
    }
  </style>
</head>

    const timeHeaders = [
      ["8:00 AM", "to", "8:50 AM"],

      ["4:00 PM", "to", "4:50 PM"],
      ["5:00 PM", "to", "5:50 PM"],
      ["6:00 PM", "to", "6:50 PM"],
      ["6:51 PM", "", ""]
    ];

    const labHeaders = [
      ["08:00 AM", "to", "08:50 AM"],
      ["08:50 AM", "to", "09:40 AM"],
      ["09:50 AM", "to", "10:40 AM"],
      ["10:40 AM", "to", "11:30 AM"],

    const rows = [
      { day: "TUE", theory: ["TFF1", "A1", "B1", "TC1/G1", "D1", "", "", "F2", "A2", "B2", "TC2/G2", "TDD2", ""], lab: ["L1", "L2", "L3", "L4", "L5", "L6", "", "L31", "L32", "L33", "L34", "L35", "L36"] },
      { day: "WED", theory: ["TGG1", "D1", "F1", "E1/SC2", "B1", "", "", "D2", "TF2/G2", "E2/SC1", "B2", "TCC2", ""], lab: ["L7", "L8", "L9", "L10", "L11", "L12", "", "L37", "L38", "L39", "L40", "L41", "L42"] },
      { day: "THU", theory: ["TEE1", "C1", "TD1/TG1", "TAA1/ECS", "TBB1/CLUB", "", "", "TE2/SE1", "C2", "TD2/TG2", "A2", "TFF2", ""], lab: ["L13", "L14", "L15", "L16", "L17", "L18", "", "L43", "L44", "L45", "L46", "L47", "L48"] },
      { day: "FRI", theory: ["TCC1", "TB1", "TA1", "F1", "TE1/SD2", "", "", "C2", "TB2", "TA2", "F2", "TEE2", ""], lab: ["L19", "L20", "L21", "L22", "L23", "L24", "", "L49", "L50", "L51", "L52", "L53", "L54"] },
      { day: "SAT", theory: ["TDD1", "E1/SE2", "C1", "TF1/G1", "A1", "", "", "D2", "E2/SD1", "TAA2/ECS", "TBB2/CLUB", "TGG2", ""], lab: ["L25", "L26", "L27", "L28", "L29", "L30", "", "L55", "L56", "L57", "L58", "L59", "L60"] }
    ];

    const theoryMinutes = [
      [480, 530],
      [540, 590],
      [600, 650],
      [660, 710],
      [720, 770],
      null,
      null,
      [840, 890],
      [900, 950],
      [960, 1010],
      [1020, 1070],
      [1080, 1130],
      null
    ];

    const labMinutes = [
      [480, 530],
      [530, 580],
      [590, 640],
      [640, 690],
      [700, 750],
      [750, 790],
      null,
      [840, 890],
      [890, 940],
      [950, 1000],
      [1000, 1050],
      [1060, 1110],
      [1110, 1150]
    ];

    const state = JSON.parse(localStorage.getItem("ffcsSelections") || "{}");

    function optionValue(option) {
      return [option.slot, option.venue, option.faculty].join("||");
    }

    function optionLabel(option) {
      const venue = option.venue ? ` (${option.venue})` : "";
      const seats = option.availability ? ` - ${option.availability} seats` : "";
      return `${option.slot} - ${option.faculty}${venue}${seats}`;
    }

    function findOption(options, value) {
      return options.find(option => optionValue(option) === value) ||
        options.find(option => option.slot === value);
    }

    function tokens(value) {
      return (value || "").split("+").map(item => item.trim()).filter(Boolean);
    }

    function cellTokens(label) {
      return label.split("/").map(item => item.trim()).filter(Boolean);
    }

    function buildSlotIndex() {
      const index = { theory: {}, lab: {} };
      rows.forEach(row => {
        ["theory", "lab"].forEach(kind => {
          const minutes = kind === "theory" ? theoryMinutes : labMinutes;
          row[kind].forEach((slotLabel, indexInDay) => {
            const range = minutes[indexInDay];
            if (!slotLabel || !range) return;
            cellTokens(slotLabel).forEach(token => {
              index[kind][token] = index[kind][token] || [];
              index[kind][token].push({
                day: row.day,
                start: range[0],
                end: range[1],
                token,
                kind
              });
            });
          });
        });
      });
      return index;
    }

    const slotIndex = buildSlotIndex();

    function intervalsFor(kind, slot) {
      return tokens(slot).flatMap(token => slotIndex[kind][token] || []);
    }

    function entriesOverlap(first, second) {
      return first.intervals.some(a =>
        second.intervals.some(b =>
          a.day === b.day && a.start < b.end && b.start < a.end
        )
      );
    }

    function entryFromOption(course, kind, option) {
      return {
        course,
        kind,
        slot: option.slot,
        faculty: option.faculty,
        venue: option.venue,
        availability: option.availability,
        label: optionLabel(option),
        parts: tokens(option.slot),
        intervals: intervalsFor(kind, option.slot)
      };
    }

    function sameSelect(entry, courseCode, kind) {
      return entry.course.code === courseCode && entry.kind === kind;
    }

    function updateOptionAvailability() {
      const entries = selectedEntries();
      document.querySelectorAll("select[data-course][data-kind]").forEach(select => {
        const { course: courseCode, kind } = select.dataset;
        const course = courses.find(item => item.code === courseCode);
        if (!course) return;

        Array.from(select.options).forEach(optionElement => {
          if (!optionElement.value) return;
          const option = findOption(course[kind], optionElement.value);
          if (!option) return;
          const candidate = entryFromOption(course, kind, option);
          const clashingEntry = entries.find(entry =>
            !sameSelect(entry, courseCode, kind) && entriesOverlap(candidate, entry)
          );

          optionElement.disabled = Boolean(clashingEntry);
          optionElement.textContent = clashingEntry
            ? `${optionLabel(option)} - clashes with ${clashingEntry.course.code}`
            : optionLabel(option);
        });
      });
    }

    function renderCards() {
      const mount = document.getElementById("courses");
      mount.innerHTML = "";

      courses.forEach(course => {
        const card = document.createElement("article");
        card.className = "course-card";
        card.style.setProperty("--accent", course.color);

        card.innerHTML = `
          <h2>${course.code} <small>${course.title}</small></h2>
          <label for="${course.code}-theory">Theory Slot:</label>
          <select id="${course.code}-theory" data-course="${course.code}" data-kind="theory">
            <option value="">-- Select Theory Slot --</option>
            ${course.theory.map(option => `<option value="${optionValue(option)}">${optionLabel(option)}</option>`).join("")}
          </select>
          <label for="${course.code}-lab">Lab Slot:</label>
          <select id="${course.code}-lab" data-course="${course.code}" data-kind="lab" ${course.lab.length ? "" : "disabled"}>
            <option value="">${course.lab.length ? "-- Select Lab Slot --" : "-- No Lab Slot --"}</option>
            ${course.lab.map(option => `<option value="${optionValue(option)}">${optionLabel(option)}</option>`).join("")}
          </select>
        `;
        mount.appendChild(card);

        const current = state[course.code] || {};
        const theory = findOption(course.theory, current.theory || "");
        const lab = findOption(course.lab, current.lab || "");
        card.querySelector("[data-kind='theory']").value = theory ? optionValue(theory) : "";
        card.querySelector("[data-kind='lab']").value = lab ? optionValue(lab) : "";
      });

    }

    document.getElementById("courses").addEventListener("change", event => {
      if (event.target.tagName !== "SELECT") return;
      const { course, kind } = event.target.dataset;
      state[course] = state[course] || {};
      state[course][kind] = event.target.value;
      localStorage.setItem("ffcsSelections", JSON.stringify(state));
      updateOptionAvailability();
      renderTable();
    });

    function selectedEntries() {
      const entries = [];
      courses.forEach(course => {
        const selected = state[course.code] || {};
        ["theory", "lab"].forEach(kind => {
          const option = findOption(course[kind], selected[kind] || "");
          if (option) {
            entries.push(entryFromOption(course, kind, option));
          }
        });
      });
      return entries;
    }

    function matchingEntries(slotLabel, kind, entries) {
      const labels = cellTokens(slotLabel);
      return entries.filter(entry => entry.kind === kind && entry.parts.some(part => labels.includes(part)));
    }

    function formatHeader(parts) {
      return parts.filter(Boolean).join("<br>");
    }

    function cellHtml(slotLabel, kind, entries) {
      if (!slotLabel) return "";
      const hits = matchingEntries(slotLabel, kind, entries);
      const base = `<span class="base">${slotLabel}</span>`;
      if (!hits.length) return base;
      const chips = hits.map(hit => `<span class="chip" style="background:${hit.course.color}">${hit.course.code}<br>${hit.slot}<br>${hit.faculty}</span>`).join("");
      return `<div class="cell-stack">${base}${chips}</div>`;
    }

    function renderTable() {
      const table = document.getElementById("timetable");
      const entries = selectedEntries();
      const conflicts = findConflicts(entries);
      const conflictKeys = new Set(conflicts.map(item => item.key));

      table.innerHTML = `
        <thead>
          <tr>
            <th class="row-head">THEORY<br>HOURS</th>
            ${timeHeaders.map((head, index) => `<th class="${index === 6 ? "lunch" : ""}">${formatHeader(head)}</th>`).join("")}
          </tr>
          <tr>
            <th class="row-head">LAB<br>HOURS</th>
            ${labHeaders.map((head, index) => `<th class="${index === 6 ? "lunch" : ""}">${formatHeader(head)}</th>`).join("")}
          </tr>
        </thead>
        <tbody>
          ${rows.map(row => `
            <tr>
              <th class="day">${row.day}</th>
              ${row.theory.map((slot, index) => `<td class="${index === 6 ? "lunch" : ""} ${conflictKeys.has(`${row.day}-theory-${slot}`) ? "conflict" : ""}">${cellHtml(slot, "theory", entries)}</td>`).join("")}
            </tr>
            <tr>
              <th class="day">${row.day}</th>
              ${row.lab.map((slot, index) => `<td class="${index === 6 ? "lunch" : ""} ${conflictKeys.has(`${row.day}-lab-${slot}`) ? "conflict" : ""}">${cellHtml(slot, "lab", entries)}</td>`).join("")}
            </tr>
          `).join("")}
        </tbody>
      `;

      const notice = document.getElementById("notice");
      if (conflicts.length) {
        notice.className = "notice show";
        notice.textContent = "Slot conflict: " + conflicts.map(item => item.text).join(" | ");
      } else {
        notice.className = "notice";
        notice.textContent = "";
      }

      document.getElementById("legend").innerHTML = courses
        .map(course => `<span><i class="dot" style="--dot:${course.color}"></i>${course.code}</span>`)
        .join("");
    }

    function findConflicts(entries) {
      const conflicts = [];
      entries.forEach((entry, index) => {
        entries.slice(index + 1).forEach(otherEntry => {
          if (!entriesOverlap(entry, otherEntry)) return;
          conflicts.push({
            key: `${entry.course.code}-${otherEntry.course.code}`,
            text: `${entry.course.code} ${entry.slot} clashes with ${otherEntry.course.code} ${otherEntry.slot}`
          });
        });
      });
      return conflicts;
    }

    function clearAll() {
      courses.forEach(course => state[course.code] = { theory: "", lab: "" });
      localStorage.removeItem("ffcsSelections");
      document.querySelectorAll("select").forEach(select => select.value = "");
      updateOptionAvailability();
      renderTable();
    }

    function downloadTimetable() {
      const chosen = selectedEntries();
      const lines = [
        "FFCS Timetable Planner",
        "Generated from Fall Semester 2026-27 annexure data",
        "",
        "Selected Slots:"
      ];

      courses.forEach(course => {
        const selected = state[course.code] || {};
        lines.push(`${course.code} - ${course.title}`);
        const theory = findOption(course.theory, selected.theory || "");
        const lab = findOption(course.lab, selected.lab || "");
        lines.push(`  Theory: ${theory ? optionLabel(theory) : "Not selected"}`);
        lines.push(`  Lab: ${course.lab.length ? (lab ? optionLabel(lab) : "Not selected") : "No lab slot"}`);
      });

      lines.push("", "Active Classes:");
      rows.forEach(row => {
        ["theory", "lab"].forEach(kind => {
          row[kind].forEach(slot => {
            const hits = matchingEntries(slot, kind, chosen);
            hits.forEach(hit => lines.push(`${row.day} ${kind.toUpperCase()} ${slot}: ${hit.course.code} (${hit.label})`));
          });
        });
      });

      const blob = new Blob([lines.join("\n")], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "ffcs-timetable.txt";
      link.click();
      URL.revokeObjectURL(link.href);
    }

    document.getElementById("clearBtn").addEventListener("click", clearAll);
    document.getElementById("downloadBtn").addEventListener("click", downloadTimetable);

    renderCards();
    updateOptionAvailability();
    renderTable();
  </script>
